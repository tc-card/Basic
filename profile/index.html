<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Set and Viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no, email=no, address=no">
    
    <!-- Basic Meta Information -->
    <title>Digital Business Card | Total Connect NFC</title>
    <meta name="description" content="View and save this digital business card, powered by Total Connect NFC.">
    <meta name="author" content="Total Connect NFC">
    <meta name="copyright" content="Total Connect NFC">
    <meta name="language" content="en-US">
    <meta name="rating" content="General">
    <meta name="distribution" content="Global">
    
    <!-- SEO -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="bingbot" content="index, follow">
    <meta name="revisit-after" content="7 days">
    <!-- FIX: Canonical now points to the correct serving domain -->
    <link rel="canonical" href="https://card.tccards.tn/">
    
    <!-- Open Graph — updated dynamically by main.js once profile loads -->
    <meta property="og:title" content="Digital Business Card | Total Connect NFC">
    <meta property="og:description" content="View and save this digital business card, powered by Total Connect NFC.">
    <meta property="og:image" content="https://tccards.tn/Assets/150.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://card.tccards.tn/">
    <meta property="og:type" content="profile">
    <meta property="og:site_name" content="Total Connect NFC">
    
    <!-- Twitter Card — updated dynamically by main.js once profile loads -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Digital Business Card | Total Connect NFC">
    <meta name="twitter:description" content="View and save this digital business card, powered by Total Connect NFC.">
    <meta name="twitter:image" content="https://tccards.tn/Assets/150.png">
    <meta name="twitter:site" content="@tccards_tn">
    <meta name="twitter:creator" content="@tccards_tn">
    
    <!-- Mobile App Settings -->
    <meta name="theme-color" content="#ff5bcfff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Total Connect NFC">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobileoptimized" content="width">
    
    <!-- Microsoft/Windows -->
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="https://tccards.tn/Assets/150.png">
    <meta name="msapplication-config" content="https://tccards.tn/browserconfig.xml">
    <meta name="application-name" content="Total Connect NFC">
    <meta name="msapplication-square70x70logo" content="https://tccards.tn/Assets/150.png">
    <meta name="msapplication-square150x150logo" content="https://tccards.tn/Assets/150.png">
    <meta name="msapplication-wide310x310logo" content="https://tccards.tn/Assets/150.png">
    <meta name="msapplication-square310x310logo" content="https://tccards.tn/Assets/150.png">
    
    <!-- Icons and Manifest -->
    <!-- NOTE: manifest.json is hosted on tccards.tn but served from card.tccards.tn.
         To fix the CORS error, add the header:
           Access-Control-Allow-Origin: https://card.tccards.tn
         to your tccards.tn server config (Nginx/Apache/.htaccess). -->
    <link rel="icon" href="https://tccards.tn/Assets/150.png" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="https://tccards.tn/Assets/150.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://tccards.tn/Assets/150.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://tccards.tn/Assets/150.png">
    <link rel="shortcut icon" href="https://tccards.tn/Assets/150.png">
    <link rel="mask-icon" href="https://tccards.tn/Assets/150.png" color="#5bbad5">
    <link rel="manifest" href="https://tccards.tn/manifest.json">

    <!-- FIX: Removed unused preload for bg.png — actual background uses background.png, set via JS -->

    <!-- Performance: preconnect to external origins -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://tccards.tn">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- FIX: Removed duplicate tailwind.min.css and cdn.tailwindcss.com script.
         Using only @tailwindcss/browser so dynamically-injected classes are always compiled. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
        <div class="absolute top-1/3 right-1/4 w-64 h-64 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-1/4 left-1/2 w-64 h-64 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Loader skeleton -->
    <div class="loader w-full max-w-md p-24 rounded-xl bg-gray-900 shadow-lg">
        <div class="flex justify-end mb-0">
            <div class="w-8 h-8 bg-gray-800 rounded-full"></div>
        </div>
        <div class="flex flex-col items-center">
            <div class="w-32 h-32 bg-gray-800 rounded-full mb-4"></div>
            <div class="w-48 h-12 bg-gray-800 rounded mb-2"></div>
            <div class="w-32 h-6 bg-gray-800 rounded mb-4"></div>
            <div class="w-64 h-16 bg-gray-800 rounded mb-4"></div>
            <div class="w-64 h-16 bg-gray-800 rounded mb-4"></div>
            <div class="w-64 h-16 bg-gray-800 rounded mb-4"></div>
            <div class="w-48 h-12 bg-gray-800 rounded mb-4"></div>
        </div>
        <div class="border-t border-gray-800 mt-4 pt-4">
            <div class="w-2/3 h-4 bg-gray-800 rounded mb-2 mx-auto"></div>
            <div class="w-1/2 h-4 bg-gray-800 rounded mx-auto"></div>
        </div>
    </div>

    <!-- Main Content: profile card is injected here by main.js -->
    <main class="card-container relative z-10 transform translate-y-5"></main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- FIX: Load main.js ONLY as a module (was loaded twice — once as module, once as plain
         script, which caused "Cannot use import statement outside a module"). -->
    <script type="module" src="main.js"></script>
    <!-- Tailwind browser JIT must come after body content so it can scan all classes -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</body>
</html>
